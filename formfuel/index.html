.ff-ex-row:last-child{border-bottom:none;}
.ff-ex-name{font-size:.9rem;font-weight:500;}
.ff-ex-note{font-size:.74rem;color:var(--muted);font-weight:300;margin-top:2px;}
.ff-ex-sets{font-family:'Bebas Neue',sans-serif;font-size:.95rem;color:var(--peach);flex-shrink:0;margin-left:12px;text-align:right;}
.ff-ex-rest{font-size:.7rem;color:var(--muted);margin-top:2px;}
.ff-tip-row{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.88rem;color:rgba(240,232,220,.75);line-height:1.5;}

.ff-hero{padding:48px 0 32px;}
.ff-hero-emblem{display:flex;align-items:center;gap:16px;margin-bottom:40px;}
.ff-features{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin:32px 0 44px;}
.ff-feature{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 14px;}
.ff-feature-icon{font-size:1.4rem;margin-bottom:8px;}
.ff-feature-title{font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:.06em;margin-bottom:4px;color:var(--cream);}
.ff-feature-desc{font-size:.73rem;color:var(--muted);line-height:1.4;font-weight:300;}
.ff-divider{height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);margin:16px 0;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.ff-fadein{animation:fadeUp .5s ease both;}
</style>

rcises":[{"name":"Light Walk","sets":"1","reps":"30 min","rest":"-","notes":""}]},{"day":"Thursday","focus":"Push","duration":"45 min","exercises":[{"name":"Overhead Press","sets":"3","reps":"10","rest":"60s","notes":"tip"}]},{"day":"Friday","focus":"Pull","duration":"45 min","exercises":[{"name":"Pull-ups","sets":"3","reps":"8","rest":"60s","notes":"tip"}]},{"day":"Saturday","focus":"Cardio","duration":"30 min","exercises":[{"name":"Steady State Cardio","sets":"1","reps":"30 min","rest":"-","notes":""}]},{"day":"Sunday","focus":"Rest","duration":"-","exercises":[]}],"supplementSuggestions":["Whey Protein","Vitamin D","Omega-3"],"progressTips":["Tip 1","Tip 2","Tip 3"]}`;

    } finally { clearInterval(iv); }

          e("button",{className:"ff-btn-ghost ff-btn",onClick:()=>setStep(4)},"← BACK"),
          e("button",{className:"ff-btn",onClick:generate,disabled:!form.budget||!form.city},"🔥 GENERATE MY PLAN")

        e("div",{className:"ff-load-title"},"BUILDING YOUR PLAN"),
        e("div",{className:"ff-load-sub"},loadMsg)
      ),
 
      // ── RESULTS ──
      step===7 && result && !result.error && e("div",{className:"ff-fadein"},
        e("span",{className:"ff-eyebrow"},"Your personalized plan"),

        e("div",{className:"ff-tabs"},
          [["overview","📊 Overview"],["diet","🍽️ Meals"],["grocery","🛒 Grocery"],["workout","💪 Workout"]].map(([id,lbl])=>
            e("button",{key:id,className:"ff-tab"+(tab===id?" on":""),onClick:()=>setTab(id)},lbl)
          )
        ),
 
        // OVERVIEW
        tab==="overview" && e("div",null,
          e("div",{className:"ff-stat-grid"},
            [["BMI",result.bmi,result.bmiCategory],["Calories",result.dailyCalories,"per day"],["Protein",(result.proteinG||"")+"g","daily"],["Carbs",(result.carbsG||"")+"g","daily"],["Fat",(result.fatG||"")+"g","daily"]].map(([label,val,sub])=>
              e("div",{key:label,className:"ff-stat"},
                e("div",{className:"ff-stat-val"},val),
                e("div",{className:"ff-stat-label"},label),
                sub&&e("div",{className:"ff-stat-sub"},sub)
              )
            )
          ),
          e("div",{className:"ff-card"},e("div",{className:"ff-section-title"},"Body Type Analysis"),e("p",{style:{fontSize:".88rem",lineHeight:1.7,color:"rgba(240,232,220,.8)",fontWeight:300}},result.bodyTypeAnalysis)),
          e("div",{className:"ff-card"},e("div",{className:"ff-section-title"},"Key Insights"),(result.keyInsights||[]).map((ins,i)=>e("div",{key:i,className:"ff-insight-row"},e("span",{className:"ff-insight-num"},"0"+(i+1)),e("span",null,ins)))),
          e("div",{className:"ff-card"},e("div",{className:"ff-section-title"},"Dietary Notes"),e("p",{style:{fontSize:".88rem",lineHeight:1.7,color:"rgba(240,232,220,.8)",fontWeight:300}},result.dietNotes)),
          result.supplementSuggestions&&result.supplementSuggestions.length>0&&e("div",{className:"ff-card"},e("div",{className:"ff-section-title"},"Supplement Suggestions"),e("div",{style:{display:"flex",flexWrap:"wrap",gap:8}},result.supplementSuggestions.map((s,i)=>e("span",{key:i,className:"ff-tag"},s))))
